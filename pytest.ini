[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (may be slow)
    slow: Slow running tests
    rag: Tests for RAG components
